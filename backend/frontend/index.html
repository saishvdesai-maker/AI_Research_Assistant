<!DOCTYPE html>
<html>
<head>
<title>AI Research Assistant</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,Segoe UI,Arial;
    background:
    radial-gradient(circle at top,#1e3a8a,#020617 60%);
    color:white;
}

#app{
    height:100vh;
    display:flex;
    padding:20px;
    gap:20px;
}


/* SIDEBAR */

#sidebar{
    width:280px;
    background:rgba(15,23,42,.75);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:20px;
}


.logo{
    font-size:22px;
    font-weight:700;
    margin-bottom:20px;
}


.upload{
    background:#111827;
    padding:15px;
    border-radius:15px;
}


input[type=file]{
    width:100%;
    margin-bottom:12px;
}


button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    color:white;
    cursor:pointer;
    font-weight:600;
}


#pdfList{
    margin-top:20px;
}


.pdf-item{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}



/* CHAT */


#main{
    flex:1;
    display:flex;
    flex-direction:column;
    background:rgba(15,23,42,.65);
    backdrop-filter:blur(20px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,.1);
}


.header{
    padding:20px;
    font-size:22px;
    border-bottom:1px solid rgba(255,255,255,.1);
}


#chat{
    flex:1;
    padding:25px;
    overflow:auto;
}


.msg{
    max-width:70%;
    padding:15px;
    margin:15px;
    border-radius:18px;
    line-height:1.5;
}


.user{
    margin-left:auto;
    background:#2563eb;
}


.ai{
    background:#1e293b;
}



#inputBox{
    display:flex;
    padding:20px;
    gap:10px;
}


#question{
    flex:1;
    padding:15px;
    border-radius:15px;
    border:none;
    outline:none;
    background:#020617;
    color:white;
}


#inputBox button{
    width:120px;
}

</style>

</head>


<body>


<div id="app">


<div id="sidebar">

<div class="logo">
🤖 AI Research
</div>


<div class="upload">

<input type="file" id="pdfFile">

<button onclick="uploadPDF()">
Upload PDF
</button>

</div>


<h3>Documents</h3>

<div id="pdfList"></div>


</div>





<div id="main">


<div class="header">
AI Research Assistant
</div>


<div id="chat">

<div class="msg ai">
👋 Hello! Upload a paper and ask me anything.
</div>


</div>



<div id="inputBox">

<input 
id="question"
placeholder="Ask your research question..."
>


<button onclick="askQuestion()">
Send
</button>


</div>


</div>



</div>



<script src="/static/script.js"></script>


</body>
</html>
