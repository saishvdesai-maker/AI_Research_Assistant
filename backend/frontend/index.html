<!DOCTYPE html>
<html>
<head>
    <title>AI Research Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        /* LAYOUT */
        #app {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        #sidebar {
            width: 25%;
            background: #111827;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        #pdfList {
            flex: 1;
            margin-top: 10px;
            overflow-y: auto;
        }

        .pdf-item {
            padding: 10px;
            background: #1f2937;
            margin-bottom: 8px;
            cursor: pointer;
            border-radius: 5px;
        }

        .pdf-item:hover {
            background: #374151;
        }

        /* MAIN CHAT */
        #main {
            width: 75%;
            display: flex;
            flex-direction: column;
        }

        #chat {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .user {
            background: #1e293b;
            text-align: right;
        }

        .ai {
            background: #334155;
        }

        /* INPUT */
        #inputBox {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        #question {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* UPLOAD */
        input[type=file] {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div id="app">

    <!-- SIDEBAR -->
    <div id="sidebar">

        <h3>📄 PDFs</h3>

        <input type="file" id="pdfFile">
        <button onclick="uploadPDF()">Upload PDF</button>

        <div id="pdfList"></div>

    </div>

    <!-- CHAT -->
    <div id="main">

        <div id="chat"></div>

        <div id="inputBox">
            <input id="question" placeholder="Ask something...">
            <button onclick="askQuestion()">Send</button>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
